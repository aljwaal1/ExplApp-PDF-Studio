<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#2859d8"><link rel="manifest" href="manifest.webmanifest"><link rel="icon" href="icon.svg"><title>ExplApp PDF Studio</title><style>:root{--b:#2859d8;--bg:#f4f7fb;--c:#fff;--t:#172033;--m:#667085;--l:#dbe3ef}*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial;background:var(--bg);color:var(--t)}header{position:sticky;top:0;z-index:9;background:#fffffff2;border-bottom:1px solid var(--l);padding:12px 18px;display:flex;justify-content:space-between}.brand{font-weight:800}.brand small{display:block;font-size:11px;color:var(--m)}main{max-width:1200px;margin:auto;padding:16px}.hero{background:linear-gradient(135deg,#2859d8,#6887ec);color:#fff;padding:22px;border-radius:22px}.hero h1{margin:0 0 8px}.tools{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-top:14px}.tool{background:#fff;border:1px solid var(--l);border-radius:16px;padding:14px;text-align:right;cursor:pointer}.tool.active,.tool:hover{border-color:var(--b);box-shadow:0 8px 22px #2859d822}.tool b{display:block}.tool span{font-size:11px;color:var(--m)}.panel{margin-top:15px;background:#fff;border:1px solid var(--l);border-radius:20px;padding:16px}.drop{display:block;border:2px dashed #b8c7df;border-radius:16px;padding:22px;text-align:center;cursor:pointer}.drop strong{display:block;margin-bottom:6px}input[type=file]{display:none}.info{display:none;background:#f3f6fb;padding:10px;border-radius:12px;margin-top:10px}.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;align-items:end}.field{flex:1;min-width:180px}.field label{display:block;font-size:12px;color:var(--m);margin-bottom:5px}input,select,button{font:inherit}input[type=text],select{width:100%;padding:11px;border:1px solid var(--l);border-radius:11px}button{border:0;border-radius:11px;padding:11px 15px;font-weight:700;cursor:pointer}.primary{background:var(--b);color:#fff}.danger{background:#fff0f0;color:#b52d2d}.hidden{display:none!important}.progress{display:none;margin-top:12px}.bar{height:8px;background:#e8edf5;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;width:0;background:var(--b)}.msg,.note{font-size:12px;color:var(--m);margin-top:7px}.results{display:grid;gap:8px;margin-top:12px}.result{border:1px solid var(--l);border-radius:11px;padding:11px;background:#fbfcff}.result b{color:var(--b)}.result small{display:block;margin-top:5px;line-height:1.6}.install{display:none}.status{font-size:12px}@media(max-width:620px){main{padding:10px}.tools{grid-template-columns:repeat(2,1fr)}.row{display:block}.field{margin-bottom:8px}.row button{width:100%;margin-bottom:7px}.hero h1{font-size:22px}}</style></head><body><header><div class="brand">ExplApp PDF Studio<small>استوديو PDF عربي متكامل</small></div><div><button id="install" class="install">تثبيت</button> <span id="net" class="status">متصل</span></div></header><main><section class="hero"><h1>كل أدوات PDF في مكان واحد</h1><div>إدارة وتحويل وبحث وOCR وجداول وكتب ومعالجة جماعية، مع بقاء ملفاتك على جهازك.</div></section><section class="tools"><button class="tool active" data-t="split"><b>✂️ تقسيم واستخراج</b><span>متصلة أو منفصلة</span></button><button class="tool" data-t="merge"><b>🧩 دمج PDF</b><span>عدة ملفات</span></button><button class="tool" data-t="organize"><b>🗂️ ترتيب وتدوير</b><span>حذف وإعادة ترتيب</span></button><button class="tool" data-t="search"><b>🔍 البحث</b><span>كلمة أو عنوان</span></button><button class="tool" data-t="txt"><b>📄 إلى TXT</b><span>نص قابل للتعديل</span></button><button class="tool" data-t="md"><b>📝 إلى Markdown</b><span>MD جاهز</span></button><button class="tool" data-t="word"><b>📘 إلى Word</b><span>DOC قابل للفتح</span></button><button class="tool" data-t="images"><b>🖼️ إلى صور</b><span>PNG داخل ZIP</span></button><button class="tool" data-t="ocr"><b>🔤 OCR</b><span>عربي وإنجليزي</span></button><button class="tool" data-t="tables"><b>📊 استخراج الجداول</b><span>Excel أو CSV</span></button><button class="tool" data-t="book"><b>📚 أدوات الكتب</b><span>العناوين والفصول</span></button><button class="tool" data-t="batch"><b>⚙️ معالجة جماعية</b><span>عدة ملفات مرة واحدة</span></button><button class="tool" data-t="blank"><b>🧹 حذف الفارغ</b><span>إزالة الصفحات الفارغة</span></button><button class="tool" data-t="compare"><b>🆚 مقارنة ملفين</b><span>مقارنة نصية</span></button></section><section class="panel"><label class="drop" id="drop"><strong id="dropTitle">اختر ملف PDF</strong><small id="dropHint">أو اسحب الملف هنا</small><input id="files" type="file" accept="application/pdf"></label><div id="info" class="info"></div><div id="splitOpt"><div class="row"><div class="field"><label>الصفحات</label><input id="pages" type="text" placeholder="1-3, 6, 9"></div><div class="field"><label>الإخراج</label><select id="mode"><option value="connected">PDF واحد متصل</option><option value="separate">كل صفحة منفصلة ZIP</option></select></div></div></div><div id="searchOpt" class="hidden"><div class="row"><div class="field"><label>كلمة أو جملة</label><input id="query" type="text"></div></div></div><div id="orgOpt" class="hidden"><div class="row"><div class="field"><label>الترتيب الجديد</label><input id="order" type="text" placeholder="3,1,2,4-8"></div><div class="field"><label>التدوير</label><select id="rot"><option>0</option><option>90</option><option>180</option><option>270</option></select></div></div></div><div id="ocrOpt" class="hidden"><div class="row"><div class="field"><label>اللغة</label><select id="lang"><option value="ara+eng">عربي وإنجليزي</option><option value="ara">عربي</option><option value="eng">إنجليزي</option></select></div><div class="field"><label>الصفحات</label><input id="ocrPages" type="text" placeholder="فارغ = الكل"></div></div><div class="note">أول استخدام يحتاج تنزيل بيانات اللغة.</div></div><div id="tableOpt" class="hidden"><div class="row"><div class="field"><label>الصفحات</label><input id="tablePages" type="text" placeholder="فارغ = الكل"></div><div class="field"><label>الصيغة</label><select id="tableFmt"><option value="xlsx">Excel</option><option value="csv">CSV</option></select></div></div></div><div id="bookOpt" class="hidden"><div class="row"><div class="field"><label>كلمات العناوين</label><input id="headPat" type="text" value="الوحدة|الفصل|الباب|الدرس|chapter|unit"></div></div></div><div id="batchOpt" class="hidden"><div class="row"><div class="field"><label>صيغة الإخراج</label><select id="batchFmt"><option value="md">Markdown</option><option value="txt">TXT</option></select></div></div></div><div class="row"><button id="run" class="primary" disabled>تنفيذ</button><button id="reset" class="danger">ملف جديد</button></div><div id="progress" class="progress"><div class="bar"><i id="bar"></i></div><div id="msg" class="msg"></div></div><div id="results" class="results"></div></section></main><script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script><script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script><script>'use strict';pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];let t='split',sel=[],bytes=null,doc=null,prompt=null;const F=$('#files'),R=$('#run'),OUT=$('#results');function prog(v,m){$('#progress').style.display='block';$('#bar').style.width=v+'%';$('#msg').textContent=m}function dl(d,n,y){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([d],{type:y}));a.download=n;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),3000)}function digits(s){return String(s||'').replace(/[٠-٩]/g,d=>'٠١٢٣٤٥٦٧٨٩'.indexOf(d)).replace(/،/g,',')}function pages(s,total,uniq=true){s=digits(s.trim());if(!s)return Array.from({length:total},(_,i)=>i);let o=[];for(const q of s.split(',')){if(q.includes('-')){let[a,b]=q.split('-').map(Number),z=a<=b?1:-1;for(let i=a;z>0?i<=b:i>=b;i+=z)if(i>0&&i<=total)o.push(i-1)}else{let n=+q;if(n>0&&n<=total)o.push(n-1)}}return uniq?[...new Set(o)]:o}async function load(f){prog(10,'قراءة الملف');bytes=await f.arrayBuffer();doc=await pdfjsLib.getDocument({data:bytes.slice(0)}).promise;$('#info').style.display='block';$('#info').textContent=`${f.name} — ${doc.numPages} صفحة`;R.disabled=false;$('#progress').style.display='none'}async function choose(list){sel=[...list].filter(f=>f.name.toLowerCase().endsWith('.pdf'));if(!sel.length)return;if(['merge','batch','compare'].includes(t)){$('#info').style.display='block';$('#info').textContent=`تم اختيار ${sel.length} ملف`;R.disabled=t==='compare'?sel.length!==2:sel.length<(t==='merge'?2:1)}else await load(sel[0])}F.onchange=e=>choose(e.target.files);drop.ondragover=e=>e.preventDefault();drop.ondrop=e=>{e.preventDefault();choose(e.dataTransfer.files)};const opts={split:'splitOpt',search:'searchOpt',organize:'orgOpt',ocr:'ocrOpt',tables:'tableOpt',book:'bookOpt',batch:'batchOpt'};$$('.tool').forEach(b=>b.onclick=()=>{t=b.dataset.t;$$('.tool').forEach(x=>x.classList.toggle('active',x===b));Object.values(opts).forEach(x=>$('#'+x).classList.add('hidden'));if(opts[t])$('#'+opts[t]).classList.remove('hidden');F.multiple=['merge','batch','compare'].includes(t);$('#dropTitle').textContent=t==='merge'?'اختر ملفين أو أكثر':t==='compare'?'اختر ملفين':t==='batch'?'اختر مجموعة ملفات':'اختر ملف PDF';reset(false)});function reset(all=true){sel=[];bytes=null;doc=null;F.value='';R.disabled=true;$('#info').style.display='none';OUT.innerHTML='';$('#progress').style.display='none';if(all){$('#pages').value='';$('#query').value=''}}$('#reset').onclick=()=>reset();async function items(d,n){let p=await d.getPage(n),c=await p.getTextContent();return c.items.map(x=>({s:x.str||'',x:x.transform[4]||0,y:x.transform[5]||0,w:x.width||0,h:Math.abs(x.transform[0]||10)}))}async function text(d=doc){let a=[];for(let n=1;n<=d.numPages;n++){prog(n/d.numPages*88,`النص من الصفحة ${n}`);a.push((await items(d,n)).map(x=>x.s).join(' ').replace(/\s+/g,' ').trim())}return a}function md(a){return a.map((x,i)=>`## الصفحة ${i+1}\n\n${x}`).join('\n\n---\n\n')}async function split(){let idx=pages($('#pages').value,doc.numPages),src=await PDFLib.PDFDocument.load(bytes.slice(0));if($('#mode').value==='connected'){let o=await PDFLib.PDFDocument.create(),ps=await o.copyPages(src,idx);ps.forEach(p=>o.addPage(p));dl(await o.save(),'extracted.pdf','application/pdf')}else{let z=new JSZip();for(let i=0;i<idx.length;i++){let o=await PDFLib.PDFDocument.create(),[p]=await o.copyPages(src,[idx[i]]);o.addPage(p);z.file(`page-${idx[i]+1}.pdf`,await o.save())}dl(await z.generateAsync({type:'uint8array'}),'pages.zip','application/zip')}}async function merge(){let o=await PDFLib.PDFDocument.create();for(const f of sel){let s=await PDFLib.PDFDocument.load(await f.arrayBuffer()),ps=await o.copyPages(s,s.getPageIndices());ps.forEach(p=>o.addPage(p))}dl(await o.save(),'merged.pdf','application/pdf')}async function organize(){let src=await PDFLib.PDFDocument.load(bytes.slice(0)),idx=pages($('#order').value,src.getPageCount(),false),o=await PDFLib.PDFDocument.create(),ps=await o.copyPages(src,idx),r=+$('#rot').value;ps.forEach(p=>{if(r)p.setRotation(PDFLib.degrees((p.getRotation().angle+r)%360));o.addPage(p)});dl(await o.save(),'organized.pdf','application/pdf')}async function search(){let q=$('#query').value.trim().toLowerCase();if(!q)throw Error('اكتب كلمة البحث');let a=await text();OUT.innerHTML='';a.forEach((x,i)=>{let k=x.toLowerCase().indexOf(q);if(k>=0)OUT.innerHTML+=`<div class="result"><b>الصفحة ${i+1}</b><small>${x.slice(Math.max(0,k-70),k+150)}</small></div>`});if(!OUT.innerHTML)OUT.innerHTML='<div class="result">لا توجد نتائج</div>'}async function conv(k){let a=await text(),n=sel[0].name.replace(/\.pdf$/i,'');if(k==='txt')dl(a.join('\n\n---\n\n'),n+'.txt','text/plain');if(k==='md')dl(md(a),n+'.md','text/markdown');if(k==='word')dl(`<html dir="rtl"><meta charset="utf-8"><body>${a.map((x,i)=>`<h2>الصفحة ${i+1}</h2><p>${x}</p>`).join('<hr>')}</body></html>`,n+'.doc','application/msword')}async function images(){let z=new JSZip();for(let n=1;n<=doc.numPages;n++){prog(n/doc.numPages*90,`صورة الصفحة ${n}`);let p=await doc.getPage(n),v=p.getViewport({scale:1.7}),c=document.createElement('canvas');c.width=v.width;c.height=v.height;await p.render({canvasContext:c.getContext('2d'),viewport:v}).promise;z.file(`page-${n}.png`,await new Promise(r=>c.toBlob(r,'image/png')))}dl(await z.generateAsync({type:'uint8array'}),'images.zip','application/zip')}async function ocr(){let idx=pages($('#ocrPages').value,doc.numPages),w=await Tesseract.createWorker($('#lang').value),a=[];try{for(let i=0;i<idx.length;i++){let n=idx[i]+1,p=await doc.getPage(n),v=p.getViewport({scale:2}),c=document.createElement('canvas');c.width=v.width;c.height=v.height;await p.render({canvasContext:c.getContext('2d'),viewport:v}).promise;prog(i/idx.length*90,`OCR الصفحة ${n}`);let r=await w.recognize(c);a.push(`--- الصفحة ${n} ---\n${r.data.text}`)}}finally{await w.terminate()}dl(a.join('\n'),'ocr.txt','text/plain')}function rows(a){let s=[...a].filter(x=>x.s.trim()).sort((a,b)=>b.y-a.y||a.x-b.x),r=[];for(const x of s){let q=r.find(z=>Math.abs(z.y-x.y)<4);if(!q){q={y:x.y,a:[]};r.push(q)}q.a.push(x)}return r.map(x=>x.a.sort((a,b)=>a.x-b.x))}async function tables(){let idx=pages($('#tablePages').value,doc.numPages),all=[];for(const i of idx){for(const r of rows(await items(doc,i+1))){let c=r.map(x=>x.s.trim()).filter(Boolean);if(c.length>1)all.push([`صفحة ${i+1}`,...c])}}if(!all.length)throw Error('لم يتم اكتشاف جدول');if($('#tableFmt').value==='csv'){let c='\ufeff'+all.map(r=>r.map(x=>'"'+String(x).replace(/"/g,'""')+'"').join(',')).join('\n');dl(c,'tables.csv','text/csv')}else{let w=XLSX.utils.book_new(),s=XLSX.utils.aoa_to_sheet(all);XLSX.utils.book_append_sheet(w,s,'الجداول');dl(XLSX.write(w,{type:'array',bookType:'xlsx'}),'tables.xlsx','application/vnd.openxmlformats-officedocument.spreadsheetml.sheet')}}async function book(){let re=new RegExp($('#headPat').value,'i'),h=[];for(let n=1;n<=doc.numPages;n++){for(const r of rows(await items(doc,n))){let x=r.map(z=>z.s).join(' ').trim();if(x.length<130&&re.test(x))h.push({p:n,x})}}OUT.innerHTML='';h.forEach((x,i)=>{let e=(h[i+1]?.p||doc.numPages+1)-1,d=document.createElement('div');d.className='result';d.innerHTML=`<b>${x.x}</b><small>الصفحات ${x.p}-${e} — اضغط للاستخراج</small>`;d.onclick=async()=>{let s=await PDFLib.PDFDocument.load(bytes.slice(0)),o=await PDFLib.PDFDocument.create(),ids=[];for(let n=x.p;n<=e;n++)ids.push(n-1);let ps=await o.copyPages(s,ids);ps.forEach(p=>o.addPage(p));dl(await o.save(),`chapter-${i+1}.pdf`,'application/pdf')};OUT.appendChild(d)});if(!h.length)OUT.innerHTML='<div class="result">لم يتم اكتشاف عناوين</div>'}async function batch(){let z=new JSZip(),f=$('#batchFmt').value;for(const x of sel){let d=await pdfjsLib.getDocument({data:await x.arrayBuffer()}).promise,a=await text(d),n=x.name.replace(/\.pdf$/i,'');z.file(n+'.'+f,f==='md'?md(a):a.join('\n\n---\n\n'))}dl(await z.generateAsync({type:'uint8array'}),'batch.zip','application/zip')}async function blank(){let a=await text(),keep=a.map((x,i)=>x.replace(/\s/g,'').length>12?i:null).filter(x=>x!==null),s=await PDFLib.PDFDocument.load(bytes.slice(0)),o=await PDFLib.PDFDocument.create(),ps=await o.copyPages(s,keep);ps.forEach(p=>o.addPage(p));dl(await o.save(),'without-blank.pdf','application/pdf')}async function compare(){let ds=[];for(const f of sel)ds.push(await pdfjsLib.getDocument({data:await f.arrayBuffer()}).promise);let a=await text(ds[0]),b=await text(ds[1]),m=Math.max(a.length,b.length);OUT.innerHTML='';for(let i=0;i<m;i++)if((a[i]||'')!==(b[i]||''))OUT.innerHTML+=`<div class="result"><b>اختلاف الصفحة ${i+1}</b><small>${(a[i]||'').slice(0,130)}<br>${(b[i]||'').slice(0,130)}</small></div>`;if(!OUT.innerHTML)OUT.innerHTML='<div class="result">الملفان متطابقان نصيًا</div>'}R.onclick=async()=>{try{R.disabled=true;OUT.innerHTML='';prog(2,'بدء العملية');if(t==='split')await split();else if(t==='merge')await merge();else if(t==='organize')await organize();else if(t==='search')await search();else if(['txt','md','word'].includes(t))await conv(t);else if(t==='images')await images();else if(t==='ocr')await ocr();else if(t==='tables')await tables();else if(t==='book')await book();else if(t==='batch')await batch();else if(t==='blank')await blank();else if(t==='compare')await compare();prog(100,'اكتملت العملية');setTimeout(()=>$('#progress').style.display='none',1200)}catch(e){alert(e.message||'حدث خطأ');$('#progress').style.display='none'}finally{R.disabled=false}};function net(){net.textContent=navigator.onLine?'متصل':'دون إنترنت'}addEventListener('online',net);addEventListener('offline',net);addEventListener('beforeinstallprompt',e=>{e.preventDefault();prompt=e;install.style.display='inline-block'});install.onclick=()=>prompt&&prompt.prompt();if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('sw.js'));</script></body></html>
