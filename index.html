<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#2859d8"><link rel="manifest" href="manifest.webmanifest"><link rel="icon" href="icon.svg"><title>ExplApp PDF Studio</title><style>
:root{--b:#2859d8;--bg:#f4f7fb;--c:#fff;--t:#172033;--m:#667085;--l:#dbe3ef;--ok:#16835b;--err:#b42318}*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial;background:var(--bg);color:var(--t)}header{position:sticky;top:0;z-index:9;background:#fffffff2;border-bottom:1px solid var(--l);padding:12px 18px;display:flex;justify-content:space-between;align-items:center}.brand{font-weight:800}.brand small{display:block;font-size:11px;color:var(--m)}main{max-width:1200px;margin:auto;padding:16px}.hero{background:linear-gradient(135deg,#2859d8,#6887ec);color:#fff;padding:22px;border-radius:22px}.hero h1{margin:0 0 8px}.tools{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-top:14px}.tool{background:#fff;border:1px solid var(--l);border-radius:16px;padding:14px;text-align:right;cursor:pointer}.tool.active,.tool:hover{border-color:var(--b);box-shadow:0 8px 22px #2859d822}.tool b{display:block}.tool span{font-size:11px;color:var(--m)}.panel{margin-top:15px;background:#fff;border:1px solid var(--l);border-radius:20px;padding:16px}.drop{display:block;border:2px dashed #b8c7df;border-radius:16px;padding:22px;text-align:center;cursor:pointer}.drop.drag{border-color:var(--b);background:#eef3ff}.drop strong{display:block;margin-bottom:6px}input[type=file]{display:none}.info{display:none;background:#f3f6fb;padding:10px;border-radius:12px;margin-top:10px}.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;align-items:end}.field{flex:1;min-width:180px}.field label{display:block;font-size:12px;color:var(--m);margin-bottom:5px}input,select,button{font:inherit}input[type=text],select{width:100%;padding:11px;border:1px solid var(--l);border-radius:11px}button{border:0;border-radius:11px;padding:11px 15px;font-weight:700;cursor:pointer}.primary{background:var(--b);color:#fff}.danger{background:#fff0f0;color:var(--err)}.hidden{display:none!important}.progress{display:none;margin-top:12px}.bar{height:8px;background:#e8edf5;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;width:0;background:var(--b)}.msg,.note{font-size:12px;color:var(--m);margin-top:7px}.results{display:grid;gap:8px;margin-top:12px}.result{border:1px solid var(--l);border-radius:11px;padding:11px;background:#fbfcff;cursor:pointer}.result b{color:var(--b)}.result small{display:block;margin-top:5px;line-height:1.6;white-space:pre-wrap}.preview{display:none;margin-top:12px;text-align:center}.preview canvas{max-width:100%;border:1px solid var(--l);border-radius:12px}.install{display:none}.status{font-size:12px}.warn{background:#fff8e8;padding:9px;border-radius:10px;color:#8a5a00}@media(max-width:620px){main{padding:10px}.tools{grid-template-columns:repeat(2,1fr)}.row{display:block}.field{margin-bottom:8px}.row button{width:100%;margin-bottom:7px}.hero h1{font-size:22px}}
</style></head><body><header><div class="brand">ExplApp PDF Studio<small>استوديو PDF عربي متكامل</small></div><div><button id="install" class="install">تثبيت</button> <span id="net" class="status">متصل</span></div></header><main><section class="hero"><h1>كل أدوات PDF في مكان واحد</h1><div>إدارة وتحويل وبحث وOCR وجداول وكتب ومعالجة جماعية، مع بقاء ملفاتك على جهازك.</div></section><section class="tools" id="tools"></section><section class="panel"><label class="drop" id="drop"><strong id="dropTitle">اختر ملف PDF</strong><small id="dropHint">أو اسحب الملف هنا</small><input id="files" type="file" accept="application/pdf"></label><div id="info" class="info"></div><div id="options"></div><div class="row"><button id="run" class="primary" disabled>تنفيذ</button><button id="reset" class="danger">ملف جديد</button></div><div id="progress" class="progress"><div class="bar"><i id="bar"></i></div><div id="msg" class="msg"></div></div><div id="results" class="results"></div><div id="preview" class="preview"><canvas id="canvas"></canvas></div></section></main>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script><script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script><script>
'use strict';pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const $=s=>document.querySelector(s),TOOLS=[['split','✂️ تقسيم واستخراج','متصلة أو منفصلة'],['merge','🧩 دمج PDF','عدة ملفات'],['organize','🗂️ ترتيب وتدوير','حذف وإعادة ترتيب'],['search','🔍 البحث','مع معاينة الصفحة'],['txt','📄 إلى TXT','نص قابل للتعديل'],['md','📝 إلى Markdown','MD جاهز'],['word','📘 إلى Word','ملف Word متوافق'],['images','🖼️ إلى صور','PNG داخل ZIP'],['ocr','🔤 OCR','عربي وإنجليزي'],['tables','📊 استخراج الجداول','Excel أو CSV'],['book','📚 أدوات الكتب','العناوين والفصول'],['batch','⚙️ معالجة جماعية','عدة ملفات'],['blank','🧹 حذف الفارغ','فحص النص والصورة'],['compare','🆚 مقارنة ملفين','مقارنة نصية']];
let tool='split',selected=[],bytes=null,pdf=null,installPrompt=null;const F=$('#files'),RUN=$('#run'),OUT=$('#results'),DROP=$('#drop');
$('#tools').innerHTML=TOOLS.map((x,i)=>`<button class="tool ${i?'':'active'}" data-tool="${x[0]}"><b>${x[1]}</b><span>${x[2]}</span></button>`).join('');
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function prog(v,m){$('#progress').style.display='block';$('#bar').style.width=Math.max(0,Math.min(100,v))+'%';$('#msg').textContent=m||''}function hideProg(){$('#progress').style.display='none'}function download(data,name,type){const u=URL.createObjectURL(new Blob([data],{type})),a=document.createElement('a');a.href=u;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),5000)}function digits(s){return String(s||'').replace(/[٠-٩]/g,d=>'٠١٢٣٤٥٦٧٨٩'.indexOf(d)).replace(/[۰-۹]/g,d=>'۰۱۲۳۴۵۶۷۸۹'.indexOf(d)).replace(/،/g,',')}function parsePages(s,total,unique=true){s=digits(s).trim();if(!s)return Array.from({length:total},(_,i)=>i);let out=[];for(const raw of s.split(',')){const q=raw.trim();if(!q)continue;if(q.includes('-')){let[a,b]=q.split('-').map(Number);if(!Number.isInteger(a)||!Number.isInteger(b))throw Error('صيغة الصفحات غير صحيحة');const step=a<=b?1:-1;for(let i=a;step>0?i<=b:i>=b;i+=step)if(i>=1&&i<=total)out.push(i-1)}else{const n=Number(q);if(Number.isInteger(n)&&n>=1&&n<=total)out.push(n-1)}}if(!out.length)throw Error('لا توجد صفحات صالحة');return unique?[...new Set(out)]:out}
function optionHtml(){const all={split:`<div class="row"><div class="field"><label>الصفحات</label><input id="pages" type="text" placeholder="1-3, 6, 9"></div><div class="field"><label>الإخراج</label><select id="mode"><option value="connected">PDF واحد متصل</option><option value="separate">كل صفحة منفصلة ZIP</option></select></div></div>`,search:`<div class="row"><div class="field"><label>كلمة أو جملة</label><input id="query" type="text"></div></div>`,organize:`<div class="row"><div class="field"><label>الترتيب الجديد</label><input id="order" type="text" placeholder="3,1,2,4-8"></div><div class="field"><label>التدوير</label><select id="rot"><option>0</option><option>90</option><option>180</option><option>270</option></select></div></div>`,ocr:`<div class="row"><div class="field"><label>اللغة</label><select id="lang"><option value="ara+eng">عربي وإنجليزي</option><option value="ara">عربي</option><option value="eng">إنجليزي</option></select></div><div class="field"><label>الصفحات</label><input id="ocrPages" type="text" placeholder="فارغ = الكل"></div></div><div class="note warn">OCR يحتاج الإنترنت في أول استخدام لتنزيل ملفات اللغة، وقد يكون بطيئًا على الهواتف القديمة.</div>`,tables:`<div class="row"><div class="field"><label>الصفحات</label><input id="tablePages" type="text" placeholder="فارغ = الكل"></div><div class="field"><label>الصيغة</label><select id="tableFmt"><option value="xlsx">Excel</option><option value="csv">CSV</option></select></div></div><div class="note">الاستخراج يعتمد على مواضع النص؛ الجداول المصورة تحتاج OCR.</div>`,book:`<div class="row"><div class="field"><label>كلمات العناوين</label><input id="headPat" type="text" value="الوحدة|الفصل|الباب|الدرس|chapter|unit"></div></div>`,batch:`<div class="row"><div class="field"><label>صيغة الإخراج</label><select id="batchFmt"><option value="md">Markdown</option><option value="txt">TXT</option></select></div></div>`};$('#options').innerHTML=all[tool]||''}
async function loadPdf(file){prog(8,'قراءة الملف…');bytes=await file.arrayBuffer();pdf=await pdfjsLib.getDocument({data:bytes.slice(0)}).promise;$('#info').style.display='block';$('#info').textContent=`${file.name} — ${pdf.numPages} صفحة — ${(file.size/1048576).toFixed(2)} MB`;RUN.disabled=false;hideProg()}
async function choose(list){selected=[...list].filter(f=>f.name.toLowerCase().endsWith('.pdf'));if(!selected.length){alert('اختر ملف PDF صالحًا');return}if(['merge','batch','compare'].includes(tool)){$('#info').style.display='block';$('#info').textContent=`تم اختيار ${selected.length} ملف`;RUN.disabled=tool==='compare'?selected.length!==2:selected.length<(tool==='merge'?2:1)}else await loadPdf(selected[0])}
F.onchange=e=>choose(e.target.files);DROP.ondragover=e=>{e.preventDefault();DROP.classList.add('drag')};DROP.ondragleave=()=>DROP.classList.remove('drag');DROP.ondrop=e=>{e.preventDefault();DROP.classList.remove('drag');choose(e.dataTransfer.files)};
function reset(clearInputs=true){selected=[];bytes=null;pdf=null;F.value='';RUN.disabled=true;$('#info').style.display='none';OUT.innerHTML='';$('#preview').style.display='none';hideProg();if(clearInputs)optionHtml()}
document.querySelectorAll('.tool').forEach(b=>b.onclick=()=>{tool=b.dataset.tool;document.querySelectorAll('.tool').forEach(x=>x.classList.toggle('active',x===b));F.multiple=['merge','batch','compare'].includes(tool);$('#dropTitle').textContent=tool==='merge'?'اختر ملفين أو أكثر':tool==='compare'?'اختر ملفين':tool==='batch'?'اختر مجموعة ملفات':'اختر ملف PDF';optionHtml();reset(false)});$('#reset').onclick=()=>reset();optionHtml();
async function pageItems(d,n){const p=await d.getPage(n),c=await p.getTextContent();return c.items.map(x=>({s:x.str||'',x:x.transform[4]||0,y:x.transform[5]||0,w:x.width||0,h:Math.max(1,Math.abs(x.height||x.transform[0]||10))}))}async function extractText(d=pdf){const a=[];for(let n=1;n<=d.numPages;n++){prog(n/d.numPages*88,`استخراج النص من الصفحة ${n}`);a.push((await pageItems(d,n)).map(x=>x.s).join(' ').replace(/\s+/g,' ').trim())}return a}function markdown(a){return a.map((x,i)=>`## الصفحة ${i+1}\n\n${x}`).join('\n\n---\n\n')}async function renderPage(n,scale=1.35){const p=await pdf.getPage(n),v=p.getViewport({scale}),c=$('#canvas');c.width=Math.ceil(v.width);c.height=Math.ceil(v.height);await p.render({canvasContext:c.getContext('2d'),viewport:v}).promise;$('#preview').style.display='block';$('#preview').scrollIntoView({behavior:'smooth'})}
async function doSplit(){const idx=parsePages($('#pages').value,pdf.numPages),src=await PDFLib.PDFDocument.load(bytes.slice(0));if($('#mode').value==='connected'){const o=await PDFLib.PDFDocument.create(),ps=await o.copyPages(src,idx);ps.forEach(p=>o.addPage(p));download(await o.save(),'extracted.pdf','application/pdf')}else{const z=new JSZip();for(let i=0;i<idx.length;i++){prog(i/idx.length*90,`تجهيز الصفحة ${idx[i]+1}`);const o=await PDFLib.PDFDocument.create(),[p]=await o.copyPages(src,[idx[i]]);o.addPage(p);z.file(`page-${idx[i]+1}.pdf`,await o.save())}download(await z.generateAsync({type:'uint8array'}),'pages.zip','application/zip')}}async function doMerge(){const o=await PDFLib.PDFDocument.create();for(let i=0;i<selected.length;i++){prog(i/selected.length*90,`دمج الملف ${i+1}`);const s=await PDFLib.PDFDocument.load(await selected[i].arrayBuffer()),ps=await o.copyPages(s,s.getPageIndices());ps.forEach(p=>o.addPage(p))}download(await o.save(),'merged.pdf','application/pdf')}async function doOrganize(){const src=await PDFLib.PDFDocument.load(bytes.slice(0)),idx=parsePages($('#order').value,src.getPageCount(),false),o=await PDFLib.PDFDocument.create(),ps=await o.copyPages(src,idx),r=+$('#rot').value;ps.forEach(p=>{if(r)p.setRotation(PDFLib.degrees((p.getRotation().angle+r)%360));o.addPage(p)});download(await o.save(),'organized.pdf','application/pdf')}async function doSearch(){const q=$('#query').value.trim().toLowerCase();if(!q)throw Error('اكتب كلمة البحث');const a=await extractText();OUT.innerHTML='';let count=0;a.forEach((x,i)=>{const k=x.toLowerCase().indexOf(q);if(k<0)return;count++;const d=document.createElement('div');d.className='result';d.innerHTML=`<b>الصفحة ${i+1}</b><small>${esc(x.slice(Math.max(0,k-80),k+180))}</small>`;d.onclick=()=>renderPage(i+1);OUT.appendChild(d)});if(!count)OUT.innerHTML='<div class="result">لا توجد نتائج</div>'}async function doConvert(kind){const a=await extractText(),name=selected[0].name.replace(/\.pdf$/i,'');if(kind==='txt')download('\ufeff'+a.join('\n\n---\n\n'),name+'.txt','text/plain;charset=utf-8');else if(kind==='md')download('\ufeff'+markdown(a),name+'.md','text/markdown;charset=utf-8');else{const html=`<html dir="rtl"><meta charset="utf-8"><body style="font-family:Arial">${a.map((x,i)=>`<h2>الصفحة ${i+1}</h2><p>${esc(x)}</p>`).join('<hr>')}</body></html>`;download('\ufeff'+html,name+'.doc','application/msword')}}async function doImages(){const z=new JSZip();for(let n=1;n<=pdf.numPages;n++){prog(n/pdf.numPages*90,`تحويل الصفحة ${n}`);const p=await pdf.getPage(n),v=p.getViewport({scale:1.6}),c=document.createElement('canvas');c.width=Math.ceil(v.width);c.height=Math.ceil(v.height);await p.render({canvasContext:c.getContext('2d'),viewport:v}).promise;const b=await new Promise(r=>c.toBlob(r,'image/png'));z.file(`page-${n}.png`,b)}download(await z.generateAsync({type:'uint8array'}),'images.zip','application/zip')}async function doOcr(){if(!navigator.onLine)throw Error('OCR يحتاج اتصالًا بالإنترنت في أول استخدام');const idx=parsePages($('#ocrPages').value,pdf.numPages),worker=await Tesseract.createWorker($('#lang').value),out=[];try{for(let i=0;i<idx.length;i++){const n=idx[i]+1,p=await pdf.getPage(n),v=p.getViewport({scale:2}),c=document.createElement('canvas');c.width=Math.ceil(v.width);c.height=Math.ceil(v.height);await p.render({canvasContext:c.getContext('2d'),viewport:v}).promise;prog(i/idx.length*90,`OCR الصفحة ${n}`);const r=await worker.recognize(c);out.push(`--- الصفحة ${n} ---\n${r.data.text}`)}}finally{await worker.terminate()}download('\ufeff'+out.join('\n\n'),'ocr.txt','text/plain;charset=utf-8')}
function groupRows(items){const sorted=items.filter(x=>x.s.trim()).sort((a,b)=>b.y-a.y||a.x-b.x),rows=[];for(const x of sorted){let r=rows.find(z=>Math.abs(z.y-x.y)<=Math.max(3,x.h*.35));if(!r){r={y:x.y,a:[]};rows.push(r)}r.a.push(x)}return rows.sort((a,b)=>b.y-a.y).map(r=>r.a.sort((a,b)=>a.x-b.x))}async function doTables(){const idx=parsePages($('#tablePages').value,pdf.numPages),all=[];for(const i of idx){const rs=groupRows(await pageItems(pdf,i+1));for(const r of rs){const cells=r.map(x=>x.s.trim()).filter(Boolean);if(cells.length>=2)all.push([`صفحة ${i+1}`,...cells])}}if(!all.length)throw Error('لم يتم اكتشاف جدول نصي');if($('#tableFmt').value==='csv'){const c='\ufeff'+all.map(r=>r.map(x=>'"'+String(x).replace(/"/g,'""')+'"').join(',')).join('\n');download(c,'tables.csv','text/csv;charset=utf-8')}else{const w=XLSX.utils.book_new(),s=XLSX.utils.aoa_to_sheet(all);XLSX.utils.book_append_sheet(w,s,'الجداول');download(XLSX.write(w,{type:'array',bookType:'xlsx'}),'tables.xlsx','application/vnd.openxmlformats-officedocument.spreadsheetml.sheet')}}async function doBook(){let re;try{re=new RegExp($('#headPat').value,'i')}catch{throw Error('صيغة كلمات العناوين غير صحيحة')}const h=[];for(let n=1;n<=pdf.numPages;n++){for(const r of groupRows(await pageItems(pdf,n))){const x=r.map(z=>z.s).join(' ').trim();if(x.length>=3&&x.length<130&&re.test(x))h.push({p:n,x})}}OUT.innerHTML='';h.forEach((x,i)=>{const end=(h[i+1]?.p||pdf.numPages+1)-1,d=document.createElement('div');d.className='result';d.innerHTML=`<b>${esc(x.x)}</b><small>الصفحات ${x.p}-${end} — اضغط للاستخراج</small>`;d.onclick=async()=>{const s=await PDFLib.PDFDocument.load(bytes.slice(0)),o=await PDFLib.PDFDocument.create(),ids=[];for(let n=x.p;n<=end;n++)ids.push(n-1);const ps=await o.copyPages(s,ids);ps.forEach(p=>o.addPage(p));download(await o.save(),`chapter-${i+1}.pdf`,'application/pdf')};OUT.appendChild(d)});if(!h.length)OUT.innerHTML='<div class="result">لم يتم اكتشاف عناوين</div>'}async function doBatch(){const z=new JSZip(),fmt=$('#batchFmt').value;for(let i=0;i<selected.length;i++){prog(i/selected.length*90,`معالجة الملف ${i+1}`);const d=await pdfjsLib.getDocument({data:await selected[i].arrayBuffer()}).promise,a=await extractText(d),n=selected[i].name.replace(/\.pdf$/i,'');z.file(`${n}.${fmt}`,fmt==='md'?markdown(a):a.join('\n\n---\n\n'))}download(await z.generateAsync({type:'uint8array'}),'batch.zip','application/zip')}async function pageLooksBlank(n){const txt=(await pageItems(pdf,n)).map(x=>x.s).join('').replace(/\s/g,'');if(txt.length>8)return false;const p=await pdf.getPage(n),v=p.getViewport({scale:.35}),c=document.createElement('canvas');c.width=Math.ceil(v.width);c.height=Math.ceil(v.height);const ctx=c.getContext('2d',{willReadFrequently:true});ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);await p.render({canvasContext:ctx,viewport:v}).promise;const data=ctx.getImageData(0,0,c.width,c.height).data;let dark=0;for(let i=0;i<data.length;i+=16){if((data[i]+data[i+1]+data[i+2])/3<245)dark++}return dark/(data.length/16)<.003}async function doBlank(){const keep=[];for(let n=1;n<=pdf.numPages;n++){prog(n/pdf.numPages*80,`فحص الصفحة ${n}`);if(!(await pageLooksBlank(n)))keep.push(n-1)}if(!keep.length)throw Error('جميع الصفحات تبدو فارغة');const s=await PDFLib.PDFDocument.load(bytes.slice(0)),o=await PDFLib.PDFDocument.create(),ps=await o.copyPages(s,keep);ps.forEach(p=>o.addPage(p));download(await o.save(),'without-blank.pdf','application/pdf')}async function doCompare(){const docs=[];for(const f of selected)docs.push(await pdfjsLib.getDocument({data:await f.arrayBuffer()}).promise);const a=await extractText(docs[0]),b=await extractText(docs[1]),m=Math.max(a.length,b.length);OUT.innerHTML='';let count=0;for(let i=0;i<m;i++){if((a[i]||'')===(b[i]||''))continue;count++;const d=document.createElement('div');d.className='result';d.innerHTML=`<b>اختلاف الصفحة ${i+1}</b><small>الملف الأول: ${esc((a[i]||'').slice(0,180))}\nالملف الثاني: ${esc((b[i]||'').slice(0,180))}</small>`;OUT.appendChild(d)}if(!count)OUT.innerHTML='<div class="result">الملفان متطابقان نصيًا</div>'}
RUN.onclick=async()=>{try{RUN.disabled=true;OUT.innerHTML='';$('#preview').style.display='none';prog(2,'بدء العملية…');if(tool==='split')await doSplit();else if(tool==='merge')await doMerge();else if(tool==='organize')await doOrganize();else if(tool==='search')await doSearch();else if(['txt','md','word'].includes(tool))await doConvert(tool);else if(tool==='images')await doImages();else if(tool==='ocr')await doOcr();else if(tool==='tables')await doTables();else if(tool==='book')await doBook();else if(tool==='batch')await doBatch();else if(tool==='blank')await doBlank();else if(tool==='compare')await doCompare();prog(100,'اكتملت العملية');setTimeout(hideProg,1200)}catch(e){console.error(e);alert(e.message||'حدث خطأ');hideProg()}finally{RUN.disabled=false}};
function netStatus(){$('#net').textContent=navigator.onLine?'متصل':'دون إنترنت'}addEventListener('online',netStatus);addEventListener('offline',netStatus);netStatus();addEventListener('beforeinstallprompt',e=>{e.preventDefault();installPrompt=e;$('#install').style.display='inline-block'});$('#install').onclick=async()=>{if(installPrompt){installPrompt.prompt();await installPrompt.userChoice;installPrompt=null;$('#install').style.display='none'}};if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('sw.js'));
</script></body></html>
