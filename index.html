<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#2859d8"><meta name="description" content="أدوات عربية محلية لإدارة وتحويل والبحث داخل ملفات PDF">
<link rel="manifest" href="manifest.webmanifest"><link rel="icon" href="icon.svg"><link rel="apple-touch-icon" href="icon.svg">
<title>ExplApp PDF Studio</title>
<style>
:root{--b:#2859d8;--bg:#f4f7fb;--card:#fff;--text:#172033;--muted:#667085;--line:#dbe3ef;--ok:#16835b;--danger:#c73737}*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text)}header{position:sticky;top:0;z-index:5;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{font-weight:800;font-size:20px}.brand small{display:block;color:var(--muted);font-size:11px;font-weight:400;margin-top:3px}.status{font-size:12px;padding:7px 10px;border-radius:99px;background:#edf7f2;color:var(--ok)}main{max-width:1180px;margin:auto;padding:20px}.hero{background:linear-gradient(135deg,#2859d8,#5e7fed);color:white;border-radius:24px;padding:24px;margin-bottom:18px;box-shadow:0 16px 40px #2859d829}.hero h1{margin:0 0 8px;font-size:29px}.hero p{margin:0;opacity:.92;line-height:1.8}.tools{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:18px}.tool{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;cursor:pointer;text-align:right;transition:.18s}.tool:hover,.tool.active{transform:translateY(-2px);border-color:var(--b);box-shadow:0 10px 28px #243b6920}.tool b{display:block;font-size:16px;margin-bottom:6px}.tool span{color:var(--muted);font-size:12px;line-height:1.6}.panel{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 10px 30px #243b6912}.drop{border:2px dashed #b8c7df;border-radius:18px;padding:24px;text-align:center;background:#f9fbff;cursor:pointer}.drop.drag{border-color:var(--b);background:#edf3ff}.drop strong{display:block;font-size:18px;margin-bottom:7px}.drop small{color:var(--muted)}input[type=file]{display:none}.file-info{display:none;margin-top:13px;padding:12px;border-radius:14px;background:#f4f7fc}.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.field{flex:1;min-width:180px}.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}input,select,button{font:inherit}input[type=text],select{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;background:white}button{border:0;border-radius:12px;padding:12px 16px;cursor:pointer;font-weight:700}.primary{background:var(--b);color:white}.secondary{background:#eaf0ff;color:#244da8}.danger{background:#fff0f0;color:var(--danger)}button:disabled{opacity:.5;cursor:not-allowed}.progress{display:none;margin-top:14px}.bar{height:9px;background:#e9eef6;border-radius:99px;overflow:hidden}.bar i{display:block;width:0;height:100%;background:var(--b);transition:.2s}.msg{margin-top:10px;color:var(--muted);font-size:13px}.results{margin-top:15px;display:grid;gap:8px}.result{padding:12px;border:1px solid var(--line);border-radius:12px;background:#fbfcff;cursor:pointer}.result b{color:var(--b)}.hidden{display:none!important}.footer{text-align:center;color:var(--muted);font-size:12px;padding:25px}.install{display:none;background:#172033;color:white}@media(max-width:600px){header{padding:11px 12px}.brand{font-size:16px}main{padding:12px}.hero{padding:18px;border-radius:18px}.hero h1{font-size:22px}.tools{grid-template-columns:repeat(2,1fr)}.tool{padding:13px}.panel{padding:14px;border-radius:18px}.row{display:block}.field{margin-bottom:10px}.row button{width:100%;margin-bottom:8px}}
</style>
</head>
<body>
<header><div class="brand">ExplApp PDF Studio<small>أدوات PDF تعمل محليًا على جهازك</small></div><div><button id="installBtn" class="install">تثبيت</button> <span id="net" class="status">متصل</span></div></header>
<main>
<section class="hero"><h1>كل أدوات PDF في مكان واحد</h1><p>قسّم، ادمج، ابحث، واستخرج النص أو Markdown أو Word والصور دون رفع ملفاتك إلى خادم.</p></section>
<section class="tools" id="tools">
<button class="tool active" data-tool="split"><b>✂️ تقسيم واستخراج</b><span>صفحات متصلة أو منفصلة</span></button>
<button class="tool" data-tool="merge"><b>🧩 دمج PDF</b><span>دمج عدة ملفات بالترتيب</span></button>
<button class="tool" data-tool="search"><b>🔍 البحث داخل PDF</b><span>كلمة أو جملة أو عنوان</span></button>
<button class="tool" data-tool="txt"><b>📄 PDF إلى TXT</b><span>نص قابل للتعديل</span></button>
<button class="tool" data-tool="md"><b>📝 PDF إلى Markdown</b><span>عناوين وفقرات منظّفة</span></button>
<button class="tool" data-tool="word"><b>📘 PDF إلى Word</b><span>ملف يفتح في Microsoft Word</span></button>
<button class="tool" data-tool="images"><b>🖼️ PDF إلى صور</b><span>PNG لكل صفحة داخل ZIP</span></button>
</section>
<section class="panel">
<label class="drop" id="drop"><strong id="dropTitle">اختر ملف PDF</strong><small id="dropHint">أو اسحب الملف إلى هنا — المعالجة محلية</small><input id="files" type="file" accept="application/pdf"></label>
<div class="file-info" id="fileInfo"></div>
<div id="splitOptions">
<div class="row"><div class="field"><label>الصفحات</label><input id="pages" type="text" placeholder="مثال: 1-3, 6, 9-12"></div><div class="field"><label>طريقة الإخراج</label><select id="mode"><option value="connected">صفحات متصلة في PDF واحد</option><option value="separate">كل صفحة في ملف مستقل ZIP</option></select></div></div>
</div>
<div id="searchOptions" class="hidden"><div class="row"><div class="field"><label>كلمة أو جملة أو عنوان</label><input id="query" type="text" placeholder="اكتب عبارة البحث"></div><button id="searchBtn" class="secondary">بحث</button></div></div>
<div class="row"><button id="run" class="primary" disabled>تنفيذ</button><button id="reset" class="danger">ملف جديد</button></div>
<div class="progress" id="progress"><div class="bar"><i id="bar"></i></div><div class="msg" id="msg">جاري المعالجة…</div></div>
<div class="results" id="results"></div>
</section>
<div class="footer">ExplApp PDF Studio — ملفاتك تبقى على جهازك</div>
</main>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
'use strict';pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];let tool='split',selected=[],pdfBytes=null,pdfDoc=null,deferredPrompt=null;
const files=$('#files'),drop=$('#drop'),run=$('#run'),results=$('#results');
function setProgress(v,t){$('#progress').style.display='block';$('#bar').style.width=v+'%';$('#msg').textContent=t||'جاري المعالجة…'}function done(t){setProgress(100,t);setTimeout(()=>$('#progress').style.display='none',1200)}function download(data,name,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),3000)}
function normalizeDigits(s){return s.replace(/[٠-٩]/g,d=>'٠١٢٣٤٥٦٧٨٩'.indexOf(d)).replace(/[۰-۹]/g,d=>'۰۱۲۳۴۵۶۷۸۹'.indexOf(d)).replace(/،/g,',')}
function parsePages(text,total){text=normalizeDigits(text.trim());if(!text)return Array.from({length:total},(_,i)=>i);const out=[];for(const part of text.split(',')){const p=part.trim();if(!p)continue;if(p.includes('-')){let[a,b]=p.split('-').map(Number);if(!a||!b)throw Error('صيغة الصفحات غير صحيحة');if(a>b)[a,b]=[b,a];for(let i=a;i<=b;i++)if(i>=1&&i<=total)out.push(i-1)}else{const n=Number(p);if(n>=1&&n<=total)out.push(n-1)}}return [...new Set(out)]}
async function loadPdf(file){setProgress(10,'قراءة الملف…');pdfBytes=await file.arrayBuffer();pdfDoc=await pdfjsLib.getDocument({data:pdfBytes.slice(0)}).promise;$('#fileInfo').style.display='block';$('#fileInfo').textContent=`${file.name} — ${pdfDoc.numPages} صفحة — ${(file.size/1024/1024).toFixed(2)} MB`;run.disabled=false;done('تم فتح الملف')}
async function onFiles(list){selected=[...list].filter(f=>f.type==='application/pdf'||f.name.toLowerCase().endsWith('.pdf'));if(!selected.length)return alert('اختر ملف PDF');if(tool==='merge'){$('#fileInfo').style.display='block';$('#fileInfo').textContent=`تم اختيار ${selected.length} ملف`;run.disabled=selected.length<2;return}await loadPdf(selected[0])}
files.onchange=e=>onFiles(e.target.files);drop.ondragover=e=>{e.preventDefault();drop.classList.add('drag')};drop.ondragleave=()=>drop.classList.remove('drag');drop.ondrop=e=>{e.preventDefault();drop.classList.remove('drag');onFiles(e.dataTransfer.files)};
$$('.tool').forEach(b=>b.onclick=()=>{tool=b.dataset.tool;$$('.tool').forEach(x=>x.classList.toggle('active',x===b));$('#splitOptions').classList.toggle('hidden',tool!=='split');$('#searchOptions').classList.toggle('hidden',tool!=='search');files.multiple=tool==='merge';$('#dropTitle').textContent=tool==='merge'?'اختر ملفي PDF أو أكثر':'اختر ملف PDF';$('#dropHint').textContent=tool==='merge'?'سيتم الدمج حسب ترتيب الاختيار':'أو اسحب الملف إلى هنا — المعالجة محلية';run.textContent=tool==='search'?'استخراج نتائج البحث':'تنفيذ';resetAll(false)});
function resetAll(clearTool=true){selected=[];pdfBytes=null;pdfDoc=null;files.value='';run.disabled=true;$('#fileInfo').style.display='none';results.innerHTML='';$('#progress').style.display='none';if(clearTool)$('#pages').value=''}$('#reset').onclick=()=>resetAll();
async function extractText(){const pages=[];for(let n=1;n<=pdfDoc.numPages;n++){setProgress(Math.round(n/pdfDoc.numPages*90),`استخراج النص من الصفحة ${n}`);const p=await pdfDoc.getPage(n),c=await p.getTextContent();pages.push(c.items.map(x=>x.str).join(' ').replace(/\s+/g,' ').trim())}return pages}
async function split(){const indexes=parsePages($('#pages').value,pdfDoc.numPages),src=await PDFLib.PDFDocument.load(pdfBytes.slice(0));if(!indexes.length)throw Error('لم يتم تحديد صفحات');if($('#mode').value==='connected'){const out=await PDFLib.PDFDocument.create(),copied=await out.copyPages(src,indexes);copied.forEach(p=>out.addPage(p));download(await out.save(),'extracted-pages.pdf','application/pdf')}else{const zip=new JSZip();for(let i=0;i<indexes.length;i++){setProgress(Math.round(i/indexes.length*90),`تجهيز الصفحة ${indexes[i]+1}`);const out=await PDFLib.PDFDocument.create(),[p]=await out.copyPages(src,[indexes[i]]);out.addPage(p);zip.file(`page-${indexes[i]+1}.pdf`,await out.save())}download(await zip.generateAsync({type:'uint8array'}),'separate-pages.zip','application/zip')}}
async function merge(){const out=await PDFLib.PDFDocument.create();for(let i=0;i<selected.length;i++){setProgress(Math.round(i/selected.length*90),`دمج الملف ${i+1}`);const src=await PDFLib.PDFDocument.load(await selected[i].arrayBuffer()),pages=await out.copyPages(src,src.getPageIndices());pages.forEach(p=>out.addPage(p))}download(await out.save(),'merged.pdf','application/pdf')}
async function search(){const q=$('#query').value.trim().toLowerCase();if(!q)throw Error('اكتب كلمة البحث');const pages=await extractText();results.innerHTML='';pages.forEach((t,i)=>{const at=t.toLowerCase().indexOf(q);if(at>=0){const d=document.createElement('div');d.className='result';d.innerHTML=`<b>الصفحة ${i+1}</b><div>${t.slice(Math.max(0,at-70),at+q.length+100)}</div>`;d.onclick=()=>{window.open(URL.createObjectURL(new Blob([pdfBytes],{type:'application/pdf'}))+`#page=${i+1}`,'_blank')};results.appendChild(d)}});if(!results.children.length)results.innerHTML='<div class="result">لم يتم العثور على نتائج. قد يكون الملف مصورًا ويحتاج OCR.</div>'}
async function convert(kind){const pages=await extractText(),name=selected[0].name.replace(/\.pdf$/i,'');if(kind==='txt')download(pages.join('\n\n--- صفحة جديدة ---\n\n'),name+'.txt','text/plain;charset=utf-8');if(kind==='md'){const md=pages.map((t,i)=>`## الصفحة ${i+1}\n\n${t}\n`).join('\n---\n\n');download(md,name+'.md','text/markdown;charset=utf-8')}if(kind==='word'){const body=pages.map((t,i)=>`<h2>الصفحة ${i+1}</h2><p>${t.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</p>`).join('<hr>');download(`<!doctype html><html dir="rtl"><meta charset="utf-8"><body>${body}</body></html>`,name+'.doc','application/msword')}}
async function images(){const zip=new JSZip();for(let n=1;n<=pdfDoc.numPages;n++){setProgress(Math.round(n/pdfDoc.numPages*90),`تحويل الصفحة ${n}`);const p=await pdfDoc.getPage(n),v=p.getViewport({scale:1.6}),c=document.createElement('canvas');c.width=v.width;c.height=v.height;await p.render({canvasContext:c.getContext('2d'),viewport:v}).promise;const blob=await new Promise(r=>c.toBlob(r,'image/png'));zip.file(`page-${n}.png`,blob)}download(await zip.generateAsync({type:'uint8array'}),'pdf-images.zip','application/zip')}
run.onclick=async()=>{try{run.disabled=true;results.innerHTML='';setProgress(2,'بدء العملية…');if(tool==='split')await split();else if(tool==='merge')await merge();else if(tool==='search')await search();else if(['txt','md','word'].includes(tool))await convert(tool);else if(tool==='images')await images();done('اكتملت العملية')}catch(e){alert(e.message||'حدث خطأ');$('#progress').style.display='none'}finally{run.disabled=false}};$('#searchBtn').onclick=()=>run.click();
function net(){const online=navigator.onLine;$('#net').textContent=online?'متصل':'دون إنترنت';$('#net').style.background=online?'#edf7f2':'#fff2e8';$('#net').style.color=online?'#16835b':'#a34d00'}addEventListener('online',net);addEventListener('offline',net);net();
addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;$('#installBtn').style.display='inline-block'});$('#installBtn').onclick=async()=>{if(deferredPrompt){deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;$('#installBtn').style.display='none'}};if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('sw.js'));
</script>
</body></html>
