name: PDF Studio Static Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check JavaScript syntax
        run: find . -type f -name '*.js' -not -path './.git/*' -print0 | xargs -0 -n1 node --check
      - name: Run core utility tests
        run: node tests/core-utils.node.mjs
